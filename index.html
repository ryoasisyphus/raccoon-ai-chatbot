<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Raccoon AI Assistant | 智能客服原型</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- 引入外部樣式表 -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<div id="app-container">
    <header>
        <div class="avatar">🦝</div>
        <div class="header-info">
            <h1>Raccoon Assistant</h1>
            <p>● 智能助手在線中</p>
        </div>
        <button id="theme-toggle" title="切換深色/淺色模式" onclick="toggleTheme()" style="margin-left: auto; background: none; border: none; font-size: 20px; cursor: pointer; opacity: 0.7;">🌓</button>
    </header>

    <div id="chat-window">
        <!-- Welcome Screen -->
        <div id="welcome-screen">
            <img src="static/concept.png" alt="Raccoon Assistant" class="concept-img">
            <h2 class="welcome-title">哈囉！我是 Raccoon</h2>
            <p class="welcome-desc">
                您的專屬智能生活助手。您可以詢問我關於**訂單進度、運費優惠、商品推薦**，或是讓我幫您挑選適合的禮物。
                <br><br>
                隨時輸入任何問題，我會盡力為您解答！
            </p>
        </div>
    </div>

    <!-- 打字狀態指示器 (Skeleton Animation) -->
    <div id="typing-indicator">
        <div class="skeleton-bubble">
            <div class="skeleton-dot"></div>
            <div class="skeleton-dot"></div>
            <div class="skeleton-dot"></div>
        </div>
    </div>

    <div class="category-tabs" style="padding: 10px 24px 0; display: flex; gap: 15px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; border-bottom: 1px solid var(--border);">
        <button class="tab-btn active" onclick="switchCategory(this, 'all')">全部</button>
        <button class="tab-btn" onclick="switchCategory(this, 'order')">物流售後</button>
        <button class="tab-btn" onclick="switchCategory(this, 'member')">會員優惠</button>
        <button class="tab-btn" onclick="switchCategory(this, 'product')">購物推薦</button>
    </div>

    <div class="quick-actions">
        <div class="action-chip" data-cat="member" onclick="handleQuickAction('最新優惠活動')">🎁 最新優惠</div>
        <div class="action-chip" data-cat="order" onclick="handleQuickAction('如何追蹤訂單')">📦 訂單查詢</div>
        <div class="action-chip" data-cat="product" onclick="handleQuickAction('我想挑選禮物')">✨ 禮物推薦</div>
        <div class="action-chip" data-cat="member" onclick="handleQuickAction('會員等級說明')">💎 會員權益</div>
        <div class="action-chip" data-cat="order" onclick="handleQuickAction('運費怎麼算')">🚚 運費資訊</div>
        <div class="action-chip" data-cat="order" onclick="handleQuickAction('如何退換貨')">🔄 退換貨流程</div>
        <div class="action-chip" data-cat="product" onclick="handleQuickAction('科技酷玩推薦')">🎧 科技周邊</div>
    </div>

    <div class="input-area">
        <button id="voice-btn" title="語音輸入" onclick="startVoice()">🎤</button>
        <input type="text" id="user-input" placeholder="跟我說點什麼吧..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<!-- 引入外部邏輯腳本 -->
<script src="src/app.js"></script>

<!-- 商品詳情微彈窗 (Product Modal) -->
<div id="product-modal" class="modal-overlay" style="display:none;" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">×</button>
        <img id="modal-img" src="" alt="商品圖片">
        <div class="modal-info">
            <h3 id="modal-title">商品名稱</h3>
            <div id="modal-price" class="product-price">NT$ 0</div>
            <p id="modal-desc">商品描述內容</p>
            <button class="add-to-cart-btn" onclick="goToCheckout()">加入購物車</button>
        </div>
    </div>
</div>

<!-- 結帳頁面 (Checkout Screen) -->
<div id="checkout-screen" class="checkout-overlay" style="display:none;">
    <div class="checkout-content">
        <div class="checkout-header">
            <button class="back-btn" onclick="closeCheckout()">← 返回</button>
            <h2>結帳與配送</h2>
        </div>
        
        <div class="order-summary">
            <img id="checkout-img" src="" alt="商品圖片">
            <div class="summary-details">
                <h4 id="checkout-title">商品名稱</h4>
                <div id="checkout-price" class="price">NT$ 0</div>
                <div class="qty">數量：1</div>
            </div>
        </div>

        <div class="checkout-form">
            <div class="form-group">
                <label>收件人姓名</label>
                <input type="text" placeholder="請輸入姓名" value="Raccoon 粉絲" readonly>
            </div>
            <div class="form-group">
                <label>配送地址</label>
                <input type="text" placeholder="請輸入地址" value="台北市信義區智能路 101 號" readonly>
            </div>
            <div class="form-group">
                <label>付款方式</label>
                <select>
                    <option>信用卡 (已綁定 **** 1234)</option>
                    <option>LINE Pay</option>
                    <option>超商取貨付款</option>
                </select>
            </div>
        </div>

        <div class="checkout-footer">
            <div class="total-row">
                <span>總計金額</span>
                <span id="checkout-total" class="total-price">NT$ 0</span>
            </div>
            <button class="confirm-order-btn" onclick="submitOrder()">確認結帳</button>
        </div>
    </div>
</div>

</body>
</html>
